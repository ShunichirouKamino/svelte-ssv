name: Deploy Sample to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Pin @svelte-ssv/core to published version
        working-directory: sample-svelte
        run: |
          CURRENT=$(npm view @svelte-ssv/core version)
          npm pkg set "dependencies.@svelte-ssv/core=^${CURRENT}"
          rm -f package-lock.json

      - name: Install dependencies
        working-directory: sample-svelte
        run: npm install

      - name: Build
        working-directory: sample-svelte
        env:
          BASE_PATH: /svelte-ssv/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: sample-svelte/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
